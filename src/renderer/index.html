<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Show do Projeto Hanna</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #e42c2c, #ff0a69, #51bddf, #afe1f1);
        z-index: 9999;
        transition: opacity 220ms ease;
      }

      #initial-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .initial-loader__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .initial-loader__spinner {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        animation: spin 0.9s linear infinite;
      }

      .initial-loader__label {
        margin: 0;
        color: #fff;
        font-family: 'Roboto', 'Helvetica', 'Arial', sans-serif;
        font-size: 0.95rem;
        font-weight: bold;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" aria-label="Loading application">
      <div class="initial-loader__inner">
        <div class="initial-loader__spinner"></div>
        <p class="initial-loader__label">Carregando...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
